<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centrar con Anchos Flexibles</title>
    <style>
        .container {
            width: 100%;
            border: 1px solid black;
            padding: 20px;
        }
        .centered-div {
            width: 90vw; /* 90% del ancho del viewport */
            margin: auto;
            border: 1px solid blue;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="centered-div">
            <p style="text-align: center;">Este es un div centrado horizontalmente con un ancho flexible.</p>
        </div>
    </div>
</body>
</html>
