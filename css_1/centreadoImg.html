<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centrar Imagen</title>
    <style>
        .container {
            width: 100%;
            border: 1px solid black;
            padding: 20px;
        }
        .centered-image {
            display: block; /* Necesario para que margin: auto funcione en imágenes */
            margin: auto;
            width: 25%; /* Establecemos un ancho específico */
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="../img/itpm.png" alt="Imagen de Ejemplo" class="centered-image">
    </div>
</body>
</html>
