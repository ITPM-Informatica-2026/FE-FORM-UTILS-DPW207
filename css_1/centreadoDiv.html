<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centrar con margin: auto</title>
    <style>
        .container {
            width: 100%;
            border: 1px solid black;
            padding: 20px;
        }
        .centered-div {
            width: 60%; /* Establecemos un ancho específico */
            margin: auto; /* Centramos horizontalmente */
            border: 1px solid blue;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="centered-div">
            <p>Este es un div centrado horizontalmente.</p>
        </div>
    </div>
</body>
</html>
