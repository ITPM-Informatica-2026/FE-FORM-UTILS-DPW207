<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Display Inline-Block</title>
    <style>
        .inline-block {
            display: inline-block;
            width: 100px;
            height: 100px;
            border: 1px solid black;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="inline-block">Elemento 1</div>
    <div class="inline-block">Elemento 2</div>
    <div class="inline-block">Elemento 3</div>
</body>
</html>
