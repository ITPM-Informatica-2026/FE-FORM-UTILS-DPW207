<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primer Documento</title>
<style>

div {
    display: inline;
    background-color: lightblue; /* Para visualizarlos mejor */
    margin: 10px; /* Para separarlos un poco */
}

span {
    display: block;
    background-color: lightgreen; /* Para visualizarlos mejor */
    width: 100px; /* Damos un ancho fijo para ver el efecto block */
    height: 30px; /* Damos un alto fijo */
    margin: 5px; /* Para separarlos un poco */
}

    </style>
</head>
<body>
    <div>Soy un div</div>
    <span>Soy un span</span>
    <span>Soy otro span</span>
    <div>Soy otro div</div>
</body>
</html>
